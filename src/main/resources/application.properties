spring.application.name=aquascape
server.port=8080
logging.level.org.springframework.security=DEBUG

# Database
spring.datasource.url=jdbc:postgresql://postgres:5432/authdb
spring.datasource.username=admin
spring.datasource.password=admin123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=your-secret-key-change-this-in-production-min-256-bits-required-for-security
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.com.example.aquascape=DEBUG